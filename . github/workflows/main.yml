name: Build Elite Luxury v4

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dự án
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Thiết lập môi trường Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y fakechroot
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          
      - name: Cài đặt SDK iOS (Để không lỗi iOS 14-16)
        run: |
          git clone https://github.com/theos/sdks.git $GITHUB_WORKSPACE/theos/sdks
          # Lệnh này giúp máy ảo nhận diện được bộ SDK để build dylib
          
      - name: Tiến hành Build Tweak (Lệnh Main)
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          # Lệnh đóng gói file .deb bản chính thức (v4)
          make package FINALPACKAGE=1
        
      - name: Lưu trữ và Xuất file .deb
        uses: actions/upload-artifact@v3
        with:
          name: Elite-v4-Result
          path: packages/*.deb
