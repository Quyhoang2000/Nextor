name: Build Elite Luxury v4

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dự án
        uses: actions/checkout@v4

      - name: Thiết lập môi trường Theos & Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y fakechroot curl build-essential libz-dev libssl-dev
          
          # 1. Thiết lập biến môi trường THEOS
          export THEOS=$GITHUB_WORKSPACE/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
          # 2. Cài đặt Theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 3. Cài đặt Toolchain (Bản Linux x86_64 chuẩn cho GitHub Actions)
          # Sử dụng bản toolchain từ kabirober (rất ổn định cho GitHub CI)
          curl -LO https://github.com/theos/toolchain/releases/download/linux-x86_64/toolchain-linux-x86_64.tar.gz
          mkdir -p $THEOS/toolchain
          tar -xf toolchain-linux-x86_64.tar.gz -C $THEOS/toolchain
          rm toolchain-linux-x86_64.tar.gz
          
          # 4. Cài đặt SDK iOS
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks

      - name: Tiến hành Build Tweak
        run: |
          # Sử dụng biến THEOS đã được thiết lập ở bước trước
          make clean
          make package FINALPACKAGE=1
        
      - name: Lưu trữ và Xuất file .deb
        uses: actions/upload-artifact@v4
        with:
          name: Elite-v4-Result
          path: packages/*.deb
