name: Build Elite Luxury v4

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dự án
        uses: actions/checkout@v4 # Cập nhật lên v4

      - name: Thiết lập môi trường Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y fakechroot
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          
      - name: Cài đặt SDK iOS
        run: |
          git clone https://github.com/theos/sdks.git $GITHUB_WORKSPACE/theos/sdks
          
      - name: Tiến hành Build Tweak
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          make package FINALPACKAGE=1
        
      - name: Lưu trữ và Xuất file .deb
        uses: actions/upload-artifact@v4 # QUAN TRỌNG: Đã đổi v3 thành v4
        with:
          name: Elite-v4-Result
          path: packages/*.deb
