name: Build Elite Luxury v4.8

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dự án
        uses: actions/checkout@v4

      - name: Thiết lập môi trường Theos & Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y fakechroot curl build-essential libz-dev libssl-dev
          
          # 1. Cài đặt Theos
          export THEOS=$GITHUB_WORKSPACE/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 2. Tải Toolchain (Sử dụng link mới nhất 2026 - Bản ổn định cho Ubuntu x86_64)
          mkdir -p $THEOS/toolchain
          curl -Lf "https://github.com/kabirober/toolchain-linux-x86_64/releases/download/v1.0/toolchain-linux-x86_64.tar.gz" | tar -xz -C $THEOS/toolchain
          
          # 3. Cài đặt SDK iOS
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks

      - name: Tiến hành Build Tweak
        run: |
          # Ép sử dụng Toolchain vừa tải
          export THEOS=$GITHUB_WORKSPACE/theos
          make clean
          make package FINALPACKAGE=1
        
      - name: Lưu trữ và Xuất file .deb
        uses: actions/upload-artifact@v4
        with:
          name: Elite-v4-Result
          path: packages/*.deb
