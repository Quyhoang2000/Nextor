name: Build Elite Luxury v4.8

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dự án
        uses: actions/checkout@v4

      - name: Thiết lập môi trường Theos & Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y fakechroot curl build-essential libz-dev libssl-dev
          
          # 1. Cài đặt Theos
          export THEOS=$GITHUB_WORKSPACE/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 2. Tải Toolchain (Dùng link kabirober rất ổn định cho GitHub Actions)
          # Thêm cờ -L (chuyển hướng) và -f (báo lỗi nếu link hỏng)
          mkdir -p $THEOS/toolchain
          curl -Lf https://github.com/theos/toolchain/releases/download/linux-x86_64/toolchain-linux-x86_64.tar.gz | tar -xz -C $THEOS/toolchain
          
          # 3. Cài đặt SDK iOS
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks

      - name: Tiến hành Build Tweak
        run: |
          # Dùng biến THEOS đã được ghi vào môi trường GitHub
          make clean
          make package FINALPACKAGE=1
        
      - name: Lưu trữ và Xuất file .deb
        uses: actions/upload-artifact@v4
        with:
          name: Elite-Luxury-DEB
          path: packages/*.deb
