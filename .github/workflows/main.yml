name: Nextor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dự án
        uses: actions/checkout@v4

      - name: Thiết lập môi trường Theos & Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y fakechroot curl build-essential libz-dev libssl-dev
          
          # 1. Cài đặt Theos
          export THEOS=$GITHUB_WORKSPACE/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 2. Cài đặt Toolchain (Fix lỗi No such file or directory)
          # Tải bộ biên dịch từ server Theos dành cho Linux
          curl -LO https://github.com/theos/toolchain/releases/download/linux-arm64/toolchain-linux-arm64.tar.gz
          mkdir -p $THEOS/toolchain
          tar -xf toolchain-linux-arm64.tar.gz -C $THEOS/toolchain
          rm toolchain-linux-arm64.tar.gz
          
          # 3. Cài đặt SDK iOS
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks

      - name: Tiến hành Build Tweak
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          # Xóa rác cũ và đóng gói
          make clean
          make package FINALPACKAGE=1
        
      - name: Lưu trữ và Xuất file .deb
        uses: actions/upload-artifact@v4
        with:
          name: Elite-v4-Result
          path: packages/*.deb
