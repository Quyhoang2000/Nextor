name: Build Elite Luxury v4.8

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dự án
        uses: actions/checkout@v4

      # Dùng Action chuyên dụng để cài Theos, Toolchain và SDK một cách tự động
      - name: Setup Theos Environment
        uses: theos/setup-theos@master

      - name: Tiến hành Build Tweak
        run: |
          # Theos Action tự động thiết lập biến môi trường $THEOS
          make clean
          make package FINALPACKAGE=1
        
      - name: Lưu trữ và Xuất file .deb
        uses: actions/upload-artifact@v4
        with:
          name: Elite-v4-Result
          path: packages/*.deb
