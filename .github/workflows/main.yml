name: Build Elite Luxury v4.8

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dự án
        uses: actions/checkout@v4

      - name: Thiết lập môi trường Theos & Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y fakechroot curl build-essential libz-dev libssl-dev xz-utils
          
          # 1. Cài đặt Theos
          export THEOS=$GITHUB_WORKSPACE/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 2. Tải Toolchain (Sử dụng link trực tiếp từ server lưu trữ chính thức)
          mkdir -p $THEOS/toolchain
          # Tải bản Toolchain ổn định nhất cho Linux x86_64
          curl -L "https://github.com/theos/toolchain/releases/download/linux-x86_64/toolchain-linux-x86_64.tar.xz" -o toolchain.tar.xz
          
          # Kiểm tra nếu file tải về quá nhỏ (lỗi HTML) thì dừng lại
          if [ $(stat -c%s "toolchain.tar.xz") -lt 1000000 ]; then
            echo "Lỗi: File tải về không đúng định dạng toolchain. Kiểm tra lại link!"
            exit 1
          fi
          
          tar -xf toolchain.tar.xz -C $THEOS/toolchain
          rm toolchain.tar.xz
          
          # 3. Cài đặt SDK iOS
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks

      - name: Tiến hành Build Tweak
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          make clean
          make package FINALPACKAGE=1
        
      - name: Lưu trữ và Xuất file .deb
        uses: actions/upload-artifact@v4
        with:
          name: Elite-v4-Result
          path: packages/*.deb
