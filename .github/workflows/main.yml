name: Build Elite Luxury v4

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dự án
        uses: actions/checkout@v4

      - name: Thiết lập môi trường Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y fakechroot
          # Clone Theos nếu chưa có
          [ -d theos ] || git clone --recursive https://github.com/theos/theos.git theos
          
      - name: Cài đặt SDK iOS (Fix lỗi No SDKs)
        run: |
          # Xóa thư mục sdks cũ nếu nó bị trống hoặc lỗi
          rm -rf theos/sdks
          # Clone bộ SDK mới nhất (chỉ lấy bản 14.5 hoặc 16.x để nhẹ và nhanh)
          git clone --depth 1 https://github.com/theos/sdks.git theos/sdks
          
      - name: Tiến hành Build Tweak
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          # Lệnh thực thi build bản chính thức
          make package FINALPACKAGE=1
        
      - name: Lưu trữ và Xuất file .deb
        uses: actions/upload-artifact@v4
        with:
          name: Elite-v4-Result
          path: packages/*.deb
